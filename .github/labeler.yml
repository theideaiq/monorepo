# This workflow will ensure that all pull requests are labeled based on the
# files that are modified in the pull request.
#
# For more information, see:
# https://github.com/actions/labeler

'area: web':
  - changed-files:
      - any-glob-to-any-file: 'apps/web/**/*'

'area: admin':
  - changed-files:
      - any-glob-to-any-file: 'apps/admin/**/*'

'area: droid':
  - changed-files:
      - any-glob-to-any-file: 'apps/droid/**/*'

'area: ui':
  - changed-files:
      - any-glob-to-any-file: 'packages/ui/**/*'

'area: database':
  - changed-files:
      - any-glob-to-any-file: 'packages/database/**/*'

'area: config':
  - changed-files:
      - any-glob-to-any-file: 'packages/config/**/*'

'area: utils':
  - changed-files:
      - any-glob-to-any-file: 'packages/utils/**/*'

'area: docs':
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: 'docs/**/*'

'area: ci':
  - changed-files:
      - any-glob-to-any-file: '.github/**/*'
