name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '37 20 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Java
        uses: actions/setup-java@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: ${{ matrix.language == 'java-kotlin' || matrix.language == 'java' }}
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          run_install: false
          version: "10"

      - name: Build JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Android (Java) Build
        if: ${{ matrix.language == 'java-kotlin' || matrix.language == 'java' }}
        run: |
          echo "# 1. Restore Secrets (Generates google-services.json)"
          pnpm run secrets:restore --filter web
          
          echo "# 2. Grant Permission"
          chmod +x apps/web/android/gradlew
          
          echo "# 3. Build Debug APK (Sufficient for analysis)"
          cd apps/web/android && ./gradlew assembleDebug --no-daemon

      - name: Setup iOS (Swift) Build
        if: ${{ matrix.language == 'swift' }}
        run: |
          echo "# 1. Restore Secrets (Generates GoogleService-Info.plist)"
          pnpm run secrets:restore --filter web
          
          echo "# 2. Determine Build Type (CocoaPods vs SPM)"
          if [ -f "apps/web/ios/App/Podfile" ]; then
              echo "✅ Podfile found. Installing CocoaPods..."
              cd apps/web/ios/App && pod install --repo-update && cd -
              BUILD_TARGET="-workspace apps/web/ios/App/App.xcworkspace"
          else
              echo "⚠️ No Podfile found. Assuming Swift Package Manager (SPM)."
              echo "Resolving Dependencies..."
              xcodebuild -resolvePackageDependencies -project apps/web/ios/App/App.xcodeproj -scheme App
              BUILD_TARGET="-project apps/web/ios/App/App.xcodeproj"
          fi
          
          echo "# 3. Build for Simulator (No Signing Required)"
          echo "Building Project..."
          xcodebuild build \
            $BUILD_TARGET \
            -scheme App \
            -destination 'generic/platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          category: "/language:${{matrix.language}}"
