name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Use macOS for Swift (iOS), Ubuntu for everything else
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    
    permissions:
      security-events: write
      actions: read
      contents: read

    # Global Env: Inject secrets so the restore script can generate the missing files
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_GOOGLE_SERVICES_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_BASE64 }}
      IOS_GOOGLE_SERVICE_INFO_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_BASE64 }}
      SKIP_ENV_VALIDATION: true
      NEXT_PUBLIC_SUPABASE_URL: https://mock.com
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock
      SUPABASE_SERVICE_ROLE_KEY: mock
      TELEGRAM_BOT_TOKEN: mock
      WAYL_SECRET_KEY: mock
      WAYL_WEBHOOK_SECRET: mock
      WEB_APP_URL: https://mock.com
      UPSTASH_REDIS_REST_URL: https://mock.com
      UPSTASH_REDIS_REST_TOKEN: mock
      GEMINI_API_KEY: mock
      RESEND_API_KEY: mock
      ZAIN_SECRET_KEY: mock
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: none
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Required for 'npm run secrets:restore'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      # Required for Android Gradle Build
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Install pnpm and dependencies
        if: matrix.language == 'swift' || matrix.language == 'java-kotlin'
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile

      # Initialize CodeQL (Defines what languages to scan)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # ----------------------------------------------------------------
      # MANUAL BUILD: Swift (iOS)
      # ----------------------------------------------------------------
      - name: Manual Build (Swift)
        if: matrix.language == 'swift'
        run: |
          # 1. Restore Secrets (Generates GoogleService-Info.plist)
          pnpm run --filter=web secrets:restore

          # 2. Build Web and Sync Capacitor
          pnpm run --filter=web build
          cd apps/web && npx cap sync ios && cd ../../
          
          # 3. Determine Build Type (CocoaPods vs SPM)
          if [ -f "apps/web/ios/App/Podfile" ]; then
              echo "✅ Podfile found. Installing CocoaPods..."
              cd apps/web/ios/App && pod install --repo-update && cd -
              BUILD_TARGET="-workspace apps/web/ios/App/App.xcworkspace"
          else
              echo "⚠️ No Podfile found. Assuming Swift Package Manager (SPM)."
              echo "Resolving Dependencies..."
              xcodebuild -resolvePackageDependencies -project apps/web/ios/App/App.xcodeproj -scheme App
              BUILD_TARGET="-project apps/web/ios/App/App.xcodeproj"
          fi
          
          # 4. Build for Simulator (No Signing Required)
          echo "Building Project..."
          xcodebuild build \
            $BUILD_TARGET \
            -scheme App \
            -destination 'generic/platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ----------------------------------------------------------------
      # ANALYZE
      # ----------------------------------------------------------------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
