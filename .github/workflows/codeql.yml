name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Use macOS for Swift (iOS), Ubuntu for everything else
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    
    permissions:
      security-events: write
      actions: read
      contents: read

    # Global Env: Inject secrets so the restore script can generate the missing files
    env:
      ANDROID_GOOGLE_SERVICES_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_BASE64 }}
      IOS_GOOGLE_SERVICE_INFO_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_BASE64 }}
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: none
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required for 'npm run secrets:restore'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Required for Android Gradle Build
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      # Initialize CodeQL (Defines what languages to scan)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # ----------------------------------------------------------------
      # MANUAL BUILD: Java (Android)
      # ----------------------------------------------------------------
      - name: Manual Build (Android)
        if: matrix.language == 'java-kotlin'
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: 'https://mock.com'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'mock'
        run: |
          npm install -g pnpm
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile --engine-strict=false
          # 1. Restore Secrets (Generates google-services.json)
          pnpm --config.engine-strict=false --filter=web run secrets:restore
          
          # 2. Grant Permission
          chmod +x apps/web/android/gradlew
          
          # 3. Build Debug APK (Sufficient for analysis)
          pnpm --config.engine-strict=false --filter=web run build
          npx cap sync android --dir apps/web
          cd apps/web/android && ./gradlew assembleDebug --no-daemon

      # ----------------------------------------------------------------
      # MANUAL BUILD: Swift (iOS)
      # ----------------------------------------------------------------
      - name: Manual Build (Swift)
        if: matrix.language == 'swift'
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: 'https://mock.com'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'mock'
        run: |
          npm install -g pnpm
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile --engine-strict=false
          # 1. Restore Secrets (Generates GoogleService-Info.plist)
          pnpm --config.engine-strict=false --filter=web run secrets:restore
          
          # 2. Build Next.js and Sync Capacitor
          pnpm --config.engine-strict=false --filter=web run build
          npx cap sync ios --dir apps/web

          # 3. Determine Build Type (CocoaPods vs SPM)
          if [ -f "apps/web/ios/App/Podfile" ]; then
              echo "✅ Podfile found. Installing CocoaPods..."
              cd apps/web/ios/App && pod install --repo-update && cd -
              BUILD_TARGET="-workspace apps/web/ios/App/App.xcworkspace"
          else
              echo "⚠️ No Podfile found. Assuming Swift Package Manager (SPM)."
              echo "Resolving Dependencies..."
              xcodebuild -resolvePackageDependencies -project apps/web/ios/App/App.xcodeproj -scheme App
              BUILD_TARGET="-project apps/web/ios/App/App.xcodeproj"
          fi
          
          # 4. Build for Simulator (No Signing Required)
          echo "Building Project..."
          xcodebuild build \
            $BUILD_TARGET \
            -scheme App \
            -destination 'generic/platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ----------------------------------------------------------------
      # ANALYZE
      # ----------------------------------------------------------------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
