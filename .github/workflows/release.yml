name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WAYL_SECRET_KEY: "mock"
      WAYL_WEBHOOK_SECRET: "mock"
      ZAIN_SECRET_KEY: "mock"
      SUPABASE_SERVICE_ROLE_KEY: "mock"
      RESEND_API_KEY: "mock"
      TELEGRAM_BOT_TOKEN: "mock"
      GEMINI_API_KEY: "mock"
      UPSTASH_REDIS_REST_URL: "https://mock.app"
      UPSTASH_REDIS_REST_TOKEN: "mock"
      WEB_APP_URL: "https://mock.app"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
