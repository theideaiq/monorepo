name: Android

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_GOOGLE_SERVICES_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_BASE64 }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Mobile Web
        run: cd apps/web && pnpm build:mobile
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://mock.com' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'mock' }}
          TELEGRAM_BOT_TOKEN: 'mock'
          GEMINI_API_KEY: 'mock'
          SUPABASE_SERVICE_ROLE_KEY: 'mock'
          UPSTASH_REDIS_REST_URL: 'https://mock.com'
          UPSTASH_REDIS_REST_TOKEN: 'mock'
          WAYL_SECRET_KEY: 'mock'
          WAYL_WEBHOOK_SECRET: 'mock'
          ZAIN_SECRET_KEY: 'mock'
          RESEND_API_KEY: 'mock'

      - name: Restore Secrets
        run: cd apps/web && pnpm secrets:restore

      - name: Sync Capacitor
        run: cd apps/web && npx cap sync android

      - name: Build APK
        run: cd apps/web/android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
