name: Android

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_GOOGLE_SERVICES_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_BASE64 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.engine-strict=false

      - name: Build Mobile Web
        run: cd apps/web && pnpm build:mobile -- --config.engine-strict=false
        env:
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: "mock"
          SUPABASE_SERVICE_ROLE_KEY: "mock"
          WAYL_SECRET_KEY: "mock"
          TELEGRAM_BOT_TOKEN: "mock"
          RESEND_API_KEY: "mock"
          UPSTASH_REDIS_REST_URL: "https://mock.com"
          UPSTASH_REDIS_REST_TOKEN: "mock"
          WAYL_WEBHOOK_SECRET: "mock"
          WEB_APP_URL: "https://mock.com"
          ZAIN_SECRET_KEY: "mock"

      - name: Restore Secrets
        run: cd apps/web && pnpm secrets:restore --config.engine-strict=false

      - name: Sync Capacitor
        run: cd apps/web && pnpm sync:android --config.engine-strict=false

      - name: Build APK
        run: cd apps/web/android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug.apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
